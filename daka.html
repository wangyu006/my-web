<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡 · 社交学习圈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f1ee;
            color: #1f1b18;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px 40px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 28px 22px 32px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.06);
            border: 1px solid #eeeae6;
        }

        /* ===== 顶部导航 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #1f1b18;
        }
        .header h1 span {
            color: #b8a088;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .header-actions button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #7a6b60;
            transition: 0.2s;
            padding: 4px;
        }
        .header-actions button:hover {
            color: #1f1b18;
            transform: scale(1.05);
        }

        /* ===== 用户信息 ===== */
        .user-section {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #faf8f6;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 22px;
            border: 1px solid #f0ebe6;
        }
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #d4c8bc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #7a6b60;
            flex-shrink: 0;
        }
        .user-info {
            flex: 1;
        }
        .user-info .name {
            font-weight: 600;
            font-size: 16px;
            color: #1f1b18;
        }
        .user-info .bio {
            font-size: 13px;
            color: #9a8e84;
            margin-top: 2px;
        }
        .user-stats {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #7a6b60;
        }
        .user-stats strong {
            color: #1f1b18;
            font-size: 15px;
        }

        /* ===== 今日打卡状态 ===== */
        .today-card {
            background: #1f1b18;
            border-radius: 20px;
            padding: 20px 22px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffffff;
        }
        .today-card .left .label {
            font-size: 13px;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        .today-card .left .date {
            font-size: 18px;
            font-weight: 600;
            margin-top: 2px;
        }
        .today-card .left .date small {
            font-weight: 400;
            font-size: 14px;
            opacity: 0.6;
        }
        .checkin-btn {
            background: #ffffff;
            color: #1f1b18;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .checkin-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(255, 255, 255, 0.2);
        }
        .checkin-btn.done {
            background: #4a7c59;
            color: #ffffff;
            cursor: default;
        }
        .checkin-btn.done:hover {
            transform: none;
            box-shadow: none;
        }

        /* ===== 打卡日历 ===== */
        .calendar-section {
            margin-bottom: 24px;
        }
        .calendar-section .title {
            font-size: 15px;
            font-weight: 600;
            color: #1f1b18;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .calendar-section .title .month {
            color: #9a8e84;
            font-weight: 400;
            font-size: 14px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .calendar-grid .day {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #3d3530;
            background: #faf8f6;
            transition: 0.2s;
            cursor: default;
        }
        .calendar-grid .day.checked {
            background: #1f1b18;
            color: #ffffff;
            position: relative;
        }
        .calendar-grid .day.checked::after {
            content: "✓";
            font-size: 10px;
            position: absolute;
            top: 2px;
            right: 5px;
            color: #b8a088;
        }
        .calendar-grid .day.today {
            border: 2px solid #1f1b18;
            font-weight: 600;
        }
        .calendar-grid .day.blank {
            background: transparent;
        }
        .calendar-grid .day.checked.today {
            border-color: #b8a088;
        }

        /* ===== 社交动态流 ===== */
        .feed-title {
            font-size: 15px;
            font-weight: 600;
            color: #1f1b18;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feed-title .badge {
            background: #f0ebe6;
            color: #7a6b60;
            font-size: 11px;
            padding: 1px 12px;
            border-radius: 30px;
            font-weight: 400;
        }

        .feed-item {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #f0ebe6;
        }
        .feed-item:last-child {
            border-bottom: none;
        }
        .feed-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8e2dc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #7a6b60;
            flex-shrink: 0;
        }
        .feed-content {
            flex: 1;
        }
        .feed-content .feed-name {
            font-weight: 600;
            font-size: 14px;
            color: #1f1b18;
        }
        .feed-content .feed-name span {
            font-weight: 400;
            color: #9a8e84;
            font-size: 13px;
            margin-left: 6px;
        }
        .feed-content .feed-text {
            font-size: 14px;
            color: #3d3732;
            margin-top: 2px;
            line-height: 1.5;
        }
        .feed-content .feed-text em {
            font-style: normal;
            background: #f0ebe6;
            padding: 0 6px;
            border-radius: 4px;
            color: #6b5f55;
        }
        .feed-content .feed-meta {
            font-size: 12px;
            color: #bfb4aa;
            margin-top: 4px;
            display: flex;
            gap: 16px;
        }
        .feed-content .feed-meta .action {
            cursor: pointer;
            transition: 0.2s;
        }
        .feed-content .feed-meta .action:hover {
            color: #1f1b18;
        }
        .feed-content .feed-meta .action.liked {
            color: #c0392b;
        }

        /* ===== 发布打卡 ===== */
        .publish-section {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            background: #faf8f6;
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            border: 1px solid #eeeae6;
        }
        .publish-section input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 14px;
            color: #1f1b18;
            outline: none;
            font-family: inherit;
        }
        .publish-section input::placeholder {
            color: #bfb4aa;
        }
        .publish-section button {
            background: #1f1b18;
            color: #ffffff;
            border: none;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .publish-section button:hover {
            background: #3d3530;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #f0ebe6;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 11px;
            color: #bfb4aa;
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            padding: 4px 12px;
            font-family: inherit;
        }
        .bottom-nav .nav-item:hover {
            color: #7a6b60;
        }
        .bottom-nav .nav-item.active {
            color: #1f1b18;
            font-weight: 500;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 420px) {
            .container { padding: 20px 14px 24px; }
            .today-card { flex-direction: column; gap: 14px; text-align: center; }
            .user-section { flex-wrap: wrap; }
            .user-stats { width: 100%; justify-content: space-around; }
            .calendar-grid .day { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== 顶部 ===== -->
        <div class="header">
            <h1>📌 打卡<span>圈</span></h1>
            <div class="header-actions">
                <button title="通知">🔔</button>
                <button title="更多">⋯</button>
            </div>
        </div>

        <!-- ===== 用户信息 ===== -->
        <div class="user-section">
            <div class="avatar">👤</div>
            <div class="user-info">
                <div class="name">小锦同学</div>
                <div class="bio">📚 坚持学习 · 每日进步</div>
            </div>
            <div class="user-stats">
                <div><strong>28</strong> 天</div>
                <div><strong>12</strong> 赞</div>
            </div>
        </div>

        <!-- ===== 今日打卡 ===== -->
        <div class="today-card">
            <div class="left">
                <div class="label">📅 今日打卡</div>
                <div class="date">7月6日 <small>周一</small></div>
            </div>
            <button class="checkin-btn" id="checkinBtn">✅ 打卡</button>
        </div>

        <!-- ===== 日历 ===== -->
        <div class="calendar-section">
            <div class="title">
                <span>📆 7月 打卡记录</span>
                <span class="month">已打卡 6 天</span>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- 由 JS 生成 -->
            </div>
        </div>

        <!-- ===== 社交动态 ===== -->
        <div class="feed-title">
            📰 好友动态
            <span class="badge">12 条新</span>
        </div>

        <div class="feed-item">
            <div class="feed-avatar">📖</div>
            <div class="feed-content">
                <div class="feed-name">子玉 <span>· 2小时前</span></div>
                <div class="feed-text">今日完成 <em>数学</em> 专题训练 + <em>英语</em> 听力打卡 🎯</div>
                <div class="feed-meta">
                    <span class="action" onclick="toggleLike(this)">❤️ 8</span>
                    <span class="action">💬 3</span>
                </div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-avatar">🎨</div>
            <div class="feed-content">
                <div class="feed-name">锦瑟 <span>· 3小时前</span></div>
                <div class="feed-text">素描练习第 12 天，今天画了 <em>静物组合</em> 🖌️</div>
                <div class="feed-meta">
                    <span class="action" onclick="toggleLike(this)">❤️ 15</span>
                    <span class="action">💬 5</span>
                </div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-avatar">🎵</div>
            <div class="feed-content">
                <div class="feed-name">林老师 <span>· 5小时前</span></div>
                <div class="feed-text">练琴打卡 <em>🎹 肖邦 · 夜曲</em> 第 3 天，终于顺下来了！</div>
                <div class="feed-meta">
                    <span class="action" onclick="toggleLike(this)">❤️ 24</span>
                    <span class="action">💬 7</span>
                </div>
            </div>
        </div>

        <div class="feed-item">
            <div class="feed-avatar">✍️</div>
            <div class="feed-content">
                <div class="feed-name">小周 <span>· 6小时前</span></div>
                <div class="feed-text">硬笔书法打卡 <em>《兰亭序》</em> 节选，越写越有感觉 ✨</div>
                <div class="feed-meta">
                    <span class="action" onclick="toggleLike(this)">❤️ 11</span>
                    <span class="action">💬 2</span>
                </div>
            </div>
        </div>

        <!-- ===== 发布打卡 ===== -->
        <div class="publish-section">
            <input type="text" id="postInput" placeholder="分享你的打卡动态..." maxlength="80">
            <button id="publishBtn">发布</button>
        </div>

        <!-- ===== 底部导航 ===== -->
        <div class="bottom-nav">
            <button class="nav-item active">
                <span class="icon">🏠</span>
                首页
            </button>
            <button class="nav-item">
                <span class="icon">📊</span>
                统计
            </button>
            <button class="nav-item">
                <span class="icon">👥</span>
                好友
            </button>
            <button class="nav-item">
                <span class="icon">⚙️</span>
                我的
            </button>
        </div>

    </div>

    <script>
        // =============================================
        // 1. 生成日历（7月6日附近）
        // =============================================
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const today = new Date(2026, 6, 6); // 7月6日
            const firstDay = new Date(2026, 6, 1).getDay(); // 7月1日星期几（0=周日）
            const daysInMonth = 31;

            // 已打卡日期（模拟）
            const checkedDays = [1, 2, 3, 5, 6, 7, 9, 10, 12, 13, 14, 16, 18, 20, 22, 24, 26, 28, 30, 31];

            grid.innerHTML = '';

            // 星期头
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(w => {
                const el = document.createElement('div');
                el.className = 'day';
                el.style.fontSize = '11px';
                el.style.color = '#bfb4aa';
                el.style.fontWeight = '500';
                el.textContent = w;
                grid.appendChild(el);
            });

            // 空白填充
            for (let i = 0; i < firstDay; i++) {
                const el = document.createElement('div');
                el.className = 'day blank';
                grid.appendChild(el);
            }

            // 日期
            for (let d = 1; d <= daysInMonth; d++) {
                const el = document.createElement('div');
                el.className = 'day';
                if (checkedDays.includes(d)) {
                    el.classList.add('checked');
                }
                if (d === 6) {
                    el.classList.add('today');
                }
                el.textContent = d;
                grid.appendChild(el);
            }
        }

        renderCalendar();

        // =============================================
        // 2. 打卡按钮
        // =============================================
        const checkinBtn = document.getElementById('checkinBtn');
        let isCheckedIn = false;

        checkinBtn.addEventListener('click', function() {
            if (isCheckedIn) {
                alert('✅ 今日已打卡！明天继续加油 💪');
                return;
            }
            this.textContent = '✅ 已打卡';
            this.classList.add('done');
            isCheckedIn = true;
            alert('🎉 打卡成功！继续加油！');
        });

        // =============================================
        // 3. 发布动态
        // =============================================
        const publishBtn = document.getElementById('publishBtn');
        const postInput = document.getElementById('postInput');

        publishBtn.addEventListener('click', function() {
            const text = postInput.value.trim();
            if (!text) {
                alert('📝 请输入打卡内容～');
                return;
            }
            if (text.length > 80) {
                alert('📝 内容不能超过80个字哦');
                return;
            }

            // 构造一条新动态，插入到最前面
            const feedContainer = document.querySelector('.feed-title').nextElementSibling;
            const newItem = document.createElement('div');
            newItem.className = 'feed-item';
            newItem.style.animation = 'fadeIn 0.3s ease';
            newItem.innerHTML = `
                        <div class="feed-avatar">✨</div>
                        <div class="feed-content">
                            <div class="feed-name">小锦同学 <span>· 刚刚</span></div>
                            <div class="feed-text">${text.replace(/\n/g, ' ')}</div>
                            <div class="feed-meta">
                                <span class="action" onclick="toggleLike(this)">❤️ 0</span>
                                <span class="action">💬 0</span>
                            </div>
                        </div>
                    `;

            feedContainer.parentNode.insertBefore(newItem, feedContainer);

            postInput.value = '';
            alert('✅ 打卡动态已发布！');
        });

        // 回车发布
        postInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                publishBtn.click();
            }
        });

        // =============================================
        // 4. 点赞功能
        // =============================================
        function toggleLike(el) {
            const text = el.textContent.trim();
            const match = text.match(/(\d+)/);
            let count = match ? parseInt(match[0]) : 0;

            if (el.classList.contains('liked')) {
                count--;
                el.classList.remove('liked');
            } else {
                count++;
                el.classList.add('liked');
            }
            el.textContent = `❤️ ${count}`;
        }

        // =============================================
        // 5. 底部导航切换
        // =============================================
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                // 简单反馈
                const label = this.textContent.trim();
                if (label !== '首页') {
                    alert(`📱 "${label}" 页面开发中，敬请期待～`);
                }
            });
        });

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
                    @keyframes fadeIn {
                        from { opacity: 0; transform: translateY(-10px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                `;
        document.head.appendChild(style);
    </script>

</body>
</html>
