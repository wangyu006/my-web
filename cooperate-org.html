<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机构合作 · 1对1家教</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f2ed;
            color: #2c2a2a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 34px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid #eeeae6;
        }
        .back { display: inline-block; color: #9a8e84; text-decoration: none; font-size: 14px; margin-bottom: 20px; }
        .back:hover { color: #1f1b18; }
        h1 { font-size: 26px; font-weight: 600; color: #1f1b18; margin-bottom: 6px; }
        .sub { color: #9a8e84; font-size: 15px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #3d3530; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd8d2;
            border-radius: 12px;
            font-size: 15px;
            background: #faf8f6;
            transition: 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #1f1b18;
            background: #ffffff;
        }
        .form-group textarea { height: 100px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #1f1b18;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover { background: #3d3530; }
        .note { font-size: 13px; color: #bfb4aa; text-align: center; margin-top: 14px; }
        .divider { text-align: center; color: #d4c8bc; margin: 18px 0; font-size: 13px; letter-spacing: 6px; }
        .contact-info { background: #faf8f6; border-radius: 14px; padding: 16px 20px; text-align: center; font-size: 14px; color: #7a6b60; }
        .contact-info strong { color: #1f1b18; }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #f0ebe6;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 11px;
            color: #bfb4aa;
            text-decoration: none;
            padding: 4px 12px;
        }
        .bottom-nav a:hover { color: #7a6b60; }
        .bottom-nav a.active { color: #1f1b18; font-weight: 500; }
        .bottom-nav a .icon { font-size: 22px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="zixun.html" class="back">← 返回咨询页</a>
        <h1>🏢 机构合作</h1>
        <div class="sub">培训机构 · 学校 · 教育集团 合作申请</div>

        <!-- ===== 修改这里：action 替换成你的 Formspree 地址 ===== -->
        <form action="https://formspree.io/f/你的表单ID" method="POST">
            <input type="hidden" name="_subject" value="【机构合作】新申请">
            <input type="hidden" name="_replyto" value="sisi@yuzhihejin.cn">

            <div class="form-group">
                <label>机构名称 *</label>
                <input type="text" name="机构名称" placeholder="请输入机构全称" required>
            </div>
            <div class="form-group">
                <label>联系人 *</label>
                <input type="text" name="联系人" placeholder="请输入姓名" required>
            </div>
            <div class="form-group">
                <label>联系电话 *</label>
                <input type="tel" name="联系电话" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label>合作类型</label>
                <select name="合作类型">
                    <option value="课程合作">课程合作</option>
                    <option value="师资输送">师资输送</option>
                    <option value="品牌联名">品牌联名</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>合作需求描述</label>
                <textarea name="合作需求描述" placeholder="请详细描述合作意向..."></textarea>
            </div>
            <button type="submit" class="submit-btn">提交合作申请</button>
        </form>

        <div class="note">提交后，我们将在 1-3 个工作日内与您联系</div>
        <div class="divider">· · · · ·</div>
        <div class="contact-info">
            📧 合作邮箱：<strong>sisi@yuzhihejin.cn</strong><br>
            📞 咨询电话：<strong>400-888-9999</strong>
        </div>
        <div class="bottom-nav">
            <a href="index.html"><span class="icon">🏠</span>首页</a>
            <a href="zixun.html" class="active"><span class="icon">💬</span>1V1咨询</a>
            <a href="index.html"><span class="icon">⚙️</span>我的</a>
        </div>
    </div>
</body>
</html>
