<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>师资入驻 · 1对1家教</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f2ed;
            color: #2c2a2a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 34px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid #eeeae6;
        }
        .back { display: inline-block; color: #9a8e84; text-decoration: none; font-size: 14px; margin-bottom: 20px; }
        .back:hover { color: #1f1b18; }
        h1 { font-size: 26px; font-weight: 600; color: #1f1b18; margin-bottom: 6px; }
        .sub { color: #9a8e84; font-size: 15px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #3d3530; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd8d2;
            border-radius: 12px;
            font-size: 15px;
            background: #faf8f6;
            transition: 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #1f1b18;
            background: #ffffff;
        }
        .form-group textarea { height: 100px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #1f1b18;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover { background: #3d3530; }
        .note { font-size: 13px; color: #bfb4aa; text-align: center; margin-top: 14px; }
        .divider { text-align: center; color: #d4c8bc; margin: 18px 0; font-size: 13px; letter-spacing: 6px; }
        .contact-info { background: #faf8f6; border-radius: 14px; padding: 16px 20px; text-align: center; font-size: 14px; color: #7a6b60; }
        .contact-info strong { color: #1f1b18; }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #f0ebe6;
        }
        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 11px;
            color: #bfb4aa;
            text-decoration: none;
            padding: 4px 12px;
        }
        .bottom-nav a:hover { color: #7a6b60; }
        .bottom-nav a.active { color: #1f1b18; font-weight: 500; }
        .bottom-nav a .icon { font-size: 22px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="zixun.html" class="back">← 返回咨询页</a>
        <h1>👨‍🏫 师资入驻</h1>
        <div class="sub">优秀教师 · 行业专家 · 自由讲师 入驻申请</div>
        <form id="coopForm">
            <div class="form-group">
                <label>姓名 *</label>
                <input type="text" id="teacherName" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
                <label>联系电话 *</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label>授课科目 *</label>
                <input type="text" id="subject" placeholder="如：数学、英语、钢琴、美术..." required>
            </div>
            <div class="form-group">
                <label>教龄 / 经验</label>
                <select id="experience">
                    <option value="1-3年">1-3年</option>
                    <option value="3-5年">3-5年</option>
                    <option value="5-10年">5-10年</option>
                    <option value="10年以上">10年以上</option>
                </select>
            </div>
            <div class="form-group">
                <label>个人简介 / 教学成果</label>
                <textarea id="intro" placeholder="请描述您的教学经历、擅长领域、教学成果..."></textarea>
            </div>
            <button type="submit" class="submit-btn">提交入驻申请</button>
        </form>
        <div class="note">提交后，我们将在 1-3 个工作日内与您联系</div>
        <div class="divider">· · · · ·</div>
        <div class="contact-info">
            📧 合作邮箱：<strong>sisi@yuzhihejin.cn</strong><br>
            📞 咨询电话：<strong>400-888-9999</strong>
        </div>
        <div class="bottom-nav">
            <a href="index.html"><span class="icon">🏠</span>首页</a>
            <a href="zixun.html" class="active"><span class="icon">💬</span>1V1咨询</a>
            <a href="index.html"><span class="icon">⚙️</span>我的</a>
        </div>
    </div>
    <script>
        document.getElementById('coopForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ 师资入驻申请已提交！我们将在1-3个工作日内与您联系。');
            this.reset();
        });
    </script>
</body>
</html>
