<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理加盟 · 1对1家教</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f2ed;
            color: #2c2a2a;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 40px 34px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid #eeeae6;
        }
        .back {
            display: inline-block;
            color: #9a8e84;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back:hover { color: #1f1b18; }
        h1 { font-size: 26px; font-weight: 600; color: #1f1b18; margin-bottom: 6px; }
        .sub { color: #9a8e84; font-size: 15px; margin-bottom: 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #3d3530; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd8d2;
            border-radius: 12px;
            font-size: 15px;
            background: #faf8f6;
            transition: 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #1f1b18;
            background: #ffffff;
        }
        .form-group textarea { height: 100px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #1f1b18;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .submit-btn:hover { background: #3d3530; }
        .note { font-size: 13px; color: #bfb4aa; text-align: center; margin-top: 14px; }
        .divider { text-align: center; color: #d4c8bc; margin: 18px 0; font-size: 13px; letter-spacing: 6px; }
        .contact-info { background: #faf8f6; border-radius: 14px; padding: 16px 20px; text-align: center; font-size: 14px; color: #7a6b60; }
        .contact-info strong { color: #1f1b18; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← 返回首页</a>
        <h1>🤝 代理加盟</h1>
        <div class="sub">区域代理 · 城市合伙人 · 加盟合作 申请</div>

        <form id="coopForm">
            <div class="form-group">
                <label>申请区域 *</label>
                <input type="text" id="region" placeholder="如：武汉市江汉区" required>
            </div>
            <div class="form-group">
                <label>公司 / 个人名称 *</label>
                <input type="text" id="name" placeholder="请输入公司或个人名称" required>
            </div>
            <div class="form-group">
                <label>联系电话 *</label>
                <input type="tel" id="phone" placeholder="请输入手机号" required>
            </div>
            <div class="form-group">
                <label>加盟类型</label>
                <select id="agentType">
                    <option value="区域代理">区域代理</option>
                    <option value="城市合伙人">城市合伙人</option>
                    <option value="品牌加盟">品牌加盟</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label>资源 / 优势说明</label>
                <textarea id="advantage" placeholder="请描述您的资源、渠道、区域优势..."></textarea>
            </div>
            <button type="submit" class="submit-btn">提交加盟申请</button>
        </form>
        <div class="note">提交后，招商负责人将在 1-3 个工作日内与您联系</div>

        <div class="divider">· · · · ·</div>

        <div class="contact-info">
            📧 合作邮箱：<strong>yuzhihejin.cn</strong><br>
            📞 咨询电话：<strong>400-888-9999</strong>
        </div>
    </div>

    <script>
        document.getElementById('coopForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('✅ 代理加盟申请已提交！招商负责人将在1-3个工作日内与您联系。');
            this.reset();
        });
    </script>
</body>
</html>
