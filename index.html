        .user-stats {

            flex-wrap: wrap;

        .platform-tag {

            background: #f0ebe6;

            color: #7a6b60;
            margin-left: auto;

        .publish-section {

            gap: 12px;
            background: #faf8f6;
            border-radius: 30px;
            padding: 6px 6px 6px 18px;
            border: 1px solid #eeeae6;

        .publish-section input {

        .publish-section button {

            padding-top: 18px;
            border-top: 1px solid #f0ebe6;

            align-items: center;

            font-size: 11px;
            color: #bfb4aa;
            text-decoration: none;

        }

        }

        @media (max-width: 420px) {
            .container { padding: 20px 14px 24px; }
            .today-card { flex-direction: column; gap: 14px; text-align: center; }
            .user-section { flex-wrap: wrap; }
            .user-stats { width: 100%; justify-content: space-around; }
            .calendar-grid .day { font-size: 12px; }
            .wecom-entry { flex-direction: column; gap: 12px; text-align: center; }
            .wecom-entry .left { flex-direction: column; }
            .platform-stats { grid-template-columns: 1fr 1fr 1fr; }
            .feed-scroll { max-height: 320px; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

</head>

    // 生成AI评论（名称：评语）
    function generateAIComment() {
        const name = aiCommenters[Math.floor(Math.random() * aiCommenters.length)];
        const text = aiCommentTemplates[Math.floor(Math.random() * aiCommentTemplates.length)];
        return { name, text };
    }

    // 渲染动态
    function renderFeed() {
        const container = document.getElementById('feedScroll');
        const shuffled = [...feedData].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, 4);

        container.innerHTML = '';
        selected.forEach((item) => {
            const timeOptions = ['2 小时前', '3 小时前', '5 小时前', '6 小时前', '1 小时前', '4 小时前'];

            const likeCount = Math.floor(Math.random() * 60) + 20;
            const commentCount = Math.floor(Math.random() * 15) + 5;

            const comment1 = generateAIComment();
            const comment2 = generateAIComment();

            const div = document.createElement('div');
            div.className = 'feed-item';
            div.innerHTML = `
                <div class="feed-avatar">${item.avatar}</div>
                <div class="feed-content">
                    <div class="feed-name">${item.name} <span>· ${randomTime}</span></div>
                    <div class="feed-text">${item.content}</div>
                    <div class="feed-comment">
                        <div class="ai-comment-item"><span class="ai-name">${comment1.name}</span>：<span class="ai-text">${comment1.text}</span></div>
                        <div class="ai-comment-item"><span class="ai-name">${comment2.name}</span>：<span class="ai-text">${comment2.text}</span></div>
                    </div>
                    <div class="feed-meta">
                        <span class="like-btn" onclick="handleLike(this)">❤️ <span class="like-count">${likeCount}</span></span>
                        <span class="like-btn" onclick="alert('💬 评论区开发中')">💬 ${commentCount}</span>
                        <span class="platform-tag">${item.tags}</span>
                    </div>
                </div>
            `;
            container.appendChild(div);
        });

        document.getElementById('feedBadge').textContent = `${Math.floor(Math.random() * 18) + 12} 条新`;
    }

    // ============================================================
    // 日历（左右滑动切换月份）
    // ============================================================
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('calendarMonthLabel');

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();
        const todayDate = today.getDate();
        const todayMonth = today.getMonth();
        const todayYear = today.getFullYear();

        const checkedDays = [1, 2, 3, 5, 6, 7, 9, 10, 12, 13, 14, 16, 18, 20, 22, 24, 26, 28, 30, 31];
        if (currentMonth === todayMonth && currentYear === todayYear) {
            if (!checkedDays.includes(todayDate)) checkedDays.push(todayDate);
        }

        let checkedCount = 0;
        grid.innerHTML = '';
        ['日','一','二','三','四','五','六'].forEach(w => {
            const el = document.createElement('div');
            el.className = 'day';
            el.style.cssText = 'font-size:11px; color:#bfb4aa; font-weight:500;';
            el.textContent = w;
            grid.appendChild(el);
        });

        for (let i = 0; i < firstDay; i++) {
            const el = document.createElement('div');
            el.className = 'day blank';
            grid.appendChild(el);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const el = document.createElement('div');
            el.className = 'day';
            if (checkedDays.includes(d)) { el.classList.add('checked'); checkedCount++; }
            if (d === todayDate && currentMonth === todayMonth && currentYear === todayYear) {
                el.classList.add('today');
            }
            el.textContent = d;
            grid.appendChild(el);
        }

        monthLabel.textContent = `${currentMonth + 1}月 (${checkedCount}天)`;
    }

    document.getElementById('prevMonth').addEventListener('click', function() {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else { currentMonth--; }
        renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', function() {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else { currentMonth++; }
        renderCalendar();
    });

    // ============================================================
    // 日期更新
    // ============================================================
    function updateDate() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const weekDay = weekDays[now.getDay()];
        document.getElementById('todayDate').innerHTML = `${month}月${day}日 <small>${weekDay}</small>`;
    }

    // ============================================================
    // 打卡按钮
    // ============================================================
    const checkinBtn = document.getElementById('checkinBtn');
    let isCheckedIn = false;
    checkinBtn.addEventListener('click', function() {
        if (isCheckedIn) {
            alert('✅ 今日已打卡！明天继续加油 💪');
            return;
        }
        this.textContent = '✅ 已打卡';
        this.classList.add('done');
        isCheckedIn = true;
        alert('🎉 打卡成功！继续加油！');
        renderCalendar();
    });

    // ============================================================
    // 点赞
    // ============================================================
    function handleLike(el) {
        const countSpan = el.querySelector('.like-count');
        let count = parseInt(countSpan.textContent, 10);
        if (el.classList.contains('liked')) {
            count--;
            el.classList.remove('liked');
        } else {
            count++;
            el.classList.add('liked');
            const heart = document.createElement('span');
            heart.textContent = '❤️';
            heart.className = 'float-heart';
            const rect = el.getBoundingClientRect();
            heart.style.left = (rect.left + rect.width/2 - 12) + 'px';
            heart.style.top = (rect.top - 10) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
        countSpan.textContent = count;
    }

    // ============================================================
    // 平台数据
    // ============================================================
    const platData = {
        douyin: { el: 'platDouyin', count: 8.7 },
        xiaohongshu: { el: 'platXiaohongshu', count: 5.4 },
        wechat: { el: 'platWechat', count: 6.3 },
        bilibili: { el: 'platBilibili', count: 4.1 },
        taobao: { el: 'platTaobao', count: 3.2 },
        deepseek: { el: 'platDeepSeek', count: 2.8 }
    };

    function updatePlatformUI() {
        for (const key in platData) {
            const item = platData[key];
            document.getElementById(item.el).innerHTML = item.count.toFixed(1) + '<span class="unit"> 万</span>';
        }
    }

    function randomIncrease() {
        for (const key in platData) {
            const increment = Math.round((Math.random() * 0.4 + 0.1) * 10) / 10;
            platData[key].count += increment;
        }
        updatePlatformUI();
    }

    updatePlatformUI();
    setInterval(randomIncrease, 5000);

    // ============================================================
    // 动态刷新 & 发布
    // ============================================================
    renderFeed();
    setInterval(renderFeed, 8000);

    const publishBtn = document.getElementById('publishBtn');
    const postInput = document.getElementById('postInput');
    publishBtn.addEventListener('click', function() {
        const text = postInput.value.trim();
        if (!text) { alert('📝 请输入打卡内容～'); return; }
        if (text.length > 80) { alert('📝 内容不能超过80个字哦'); return; }

        const avatarEmojis = ['✨', '🌟', '🔥', '💪', '🎯', '📌'];
        feedData.push({
            avatar: avatarEmojis[Math.floor(Math.random() * avatarEmojis.length)],
            name: '小锦同学',
            content: text,
            tags: '🌐 全平台 AI 同步中'
        });
        renderFeed();
        postInput.value = '';
        alert('✅ 打卡动态已发布！');
    });
    postInput.addEventListener('keydown', e => { if (e.key === 'Enter') publishBtn.click(); });

    // ============================================================
    // 初始化
    // ============================================================
    updateDate();
    renderCalendar();
</script>
</body>
</html>
