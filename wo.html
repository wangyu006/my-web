<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>玉旨和锦 · 著作权登记委托书</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f4f0eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 24px 16px 60px;
        }
        .app {
            max-width: 580px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            padding: 24px 20px 30px;
            border: 1px solid #e7dfd7;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee8e1;
        }
        .header i {
            font-size: 2rem;
            color: #b07d5c;
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 650;
            color: #1e1b26;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: #b07d5c;
        }
        .header .badge {
            margin-left: auto;
            background: #eae1d8;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.6rem;
            color: #4d3f32;
            font-weight: 500;
        }
        .form-scroll {
            max-height: 640px;
            overflow-y: auto;
            padding-right: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .form-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .form-scroll::-webkit-scrollbar-track {
            background: #e5ddd5;
            border-radius: 20px;
        }
        .form-scroll::-webkit-scrollbar-thumb {
            background: #b7a697;
            border-radius: 20px;
        }
        .field-group {
            margin-bottom: 16px;
        }
        .field-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #3d352e;
            margin-bottom: 4px;
        }
        .field-group label i {
            color: #b07d5c;
            width: 18px;
            font-size: 0.9rem;
        }
        .field-group label .required {
            color: #c4554a;
            font-size: 0.7rem;
        }
        .field-group input,
        .field-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd4ca;
            border-radius: 40px;
            background: #fcf9f6;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }
        .field-group input:focus,
        .field-group select:focus {
            border-color: #b07d5c;
            background: white;
            box-shadow: 0 0 0 3px rgba(176, 125, 92, 0.12);
        }
        .field-group input[readonly] {
            background: #f0ebe6;
            color: #2a2438;
            font-weight: 500;
        }
        .field-group .hint {
            font-size: 0.65rem;
            color: #8a7b6a;
            margin-top: 3px;
            padding-left: 4px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            background: #fcf9f6;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #ddd4ca;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2f281f;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #b07d5c;
            cursor: pointer;
        }
        .file-upload-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fcf9f6;
            border: 1px solid #ddd4ca;
            border-radius: 60px;
            padding: 4px 4px 4px 18px;
            position: relative;
            margin-bottom: 8px;
        }
        .file-upload-wrapper:last-child {
            margin-bottom: 0;
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-label {
            font-size: 0.9rem;
            color: #5b4d3c;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .file-upload-wrapper .file-btn {
            background: #2a2438;
            color: white;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            white-space: nowrap;
            cursor: pointer;
        }
        .double-upload {
            background: #f8f5f0;
            border-radius: 20px;
            padding: 12px 14px;
            border: 1px solid #ede8e1;
        }
        .double-upload .sub-label {
            font-size: 0.7rem;
            color: #7b6b5a;
            margin-bottom: 6px;
            display: block;
        }
        .submit-area {
            margin-top: 8px;
            padding-top: 18px;
            border-top: 1px solid #eee8e1;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-submit {
            background: #b07d5c;
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 18px rgba(176, 125, 92, 0.25);
            flex: 1;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #a06f50;
            transform: scale(1.01);
        }
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-preview {
            background: #eae1d8;
            border: none;
            color: #2f281f;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-preview:hover {
            background: #ddd2c7;
        }
        .letter-preview {
            margin-top: 22px;
            padding: 20px 24px;
            background: #fcf9f6;
            border-radius: 24px;
            border: 1px solid #e7dfd7;
            display: none;
        }
        .letter-preview.active {
            display: block;
        }
        .letter-preview .letter-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: #1e1b26;
            margin-bottom: 18px;
        }
        .letter-preview .letter-title .highlight {
            color: #b07d5c;
        }
        .letter-preview .letter-body {
            font-size: 0.95rem;
            line-height: 2.2;
            color: #1e1b26;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .letter-preview .letter-footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding-top: 16px;
            border-top: 1px solid #e7dfd7;
        }
        .letter-preview .letter-footer .sign {
            min-width: 140px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2438;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e7dfd7;
            border-top-color: #b07d5c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-overlay p {
            color: #4d3f32;
            font-weight: 500;
        }
        @media (max-width: 460px) {
            .app { padding: 18px 14px; }
            .letter-preview { padding: 16px; }
            .checkbox-group { gap: 8px 12px; }
            .letter-footer { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p>⏳ 正在提交到湖北政务中心...</p>
    </div>

    <div class="app">
        <div class="header">
            <i class="fas fa-file-signature"></i>
            <h1>玉旨和锦 · <span>著作权登记</span></h1>
            <span class="badge"><i class="fas fa-gavel"></i> 自动生成</span>
        </div>
        <div class="form-scroll">

            <!-- 委托人 -->
            <div class="field-group">
                <label><i class="fas fa-user-circle"></i> 委托人（本人/本单位） <span class="required">*</span></label>
                <input type="text" id="entrustor" placeholder="个人姓名或公司全称">
                <div class="hint">著作权人/申请人</div>
            </div>
            <div class="field-group">
                <label><i class="fas fa-id-card"></i> 身份证/营业执照号 <span class="required">*</span></label>
                <input type="text" id="entrustorId" placeholder="身份证号或统一社会信用代码">
            </div>

            <!-- 身份证/营业执照上传入口 -->
            <div class="field-group">
                <label><i class="fas fa-upload"></i> 身份证/营业执照照片 <span class="required">*</span></label>
                <div class="double-upload">
                    <span class="sub-label"><i class="far fa-image"></i> 正面 / 第一张</span>
                    <div class="file-upload-wrapper">
                        <span class="file-label" id="idPhotoLabel1"><i class="fas fa-plus-circle"></i> 上传正面照片</span>
                        <span class="file-btn">浏览</span>
                        <input type="file" accept="image/*" id="idPhotoInput1">
                    </div>
                    <span class="sub-label" style="margin-top:8px;"><i class="far fa-image"></i> 反面 / 第二张</span>
                    <div class="file-upload-wrapper">
                        <span class="file-label" id="idPhotoLabel2"><i class="fas fa-plus-circle"></i> 上传反面照片</span>
                        <span class="file-btn">浏览</span>
                        <input type="file" accept="image/*" id="idPhotoInput2">
                    </div>
                </div>
                <div class="hint">支持 JPG、PNG 格式，请上传身份证正反面或营业执照正副本</div>
            </div>

            <!-- 被委托人（固定） -->
            <div class="field-group">
                <label><i class="fas fa-user-tie"></i> 被委托人 <span class="required">*</span></label>
                <input type="text" id="agent" value="湖北文韵科技有限公司" readonly>
                <div class="hint">接受委托办理事务的代理人（固定）</div>
            </div>
            <div class="field-group">
                <label><i class="fas fa-id-card"></i> 被委托人营业执照号 <span class="required">*</span></label>
                <input type="text" id="agentId" value="91420111MAEL5MNX50" readonly>
                <div class="hint">固定被委托人统一社会信用代码</div>
            </div>

            <!-- 作品名称 -->
            <div class="field-group">
                <label><i class="fas fa-pen"></i> 作品名称 <span class="required">*</span></label>
                <input type="text" id="workName" placeholder="请输入作品名称">
            </div>

            <!-- 作品上传入口 -->
            <div class="field-group">
                <label><i class="fas fa-upload"></i> 作品原件上传 <span class="required">*</span></label>
                <div class="file-upload-wrapper">
                    <span class="file-label" id="workFileLabel"><i class="fas fa-plus-circle"></i> 上传作品文件</span>
                    <span class="file-btn">浏览</span>
                    <input type="file" accept="image/*,application/pdf" id="workFileInput">
                </div>
                <div class="hint">支持 JPG、PNG、PDF 格式，作品原件存证</div>
            </div>

            <!-- 作品类别 -->
            <div class="field-group">
                <label><i class="fas fa-tags"></i> 作品登记类别 <span class="required">*</span></label>
                <select id="workCategory">
                    <option value="">请选择作品类别</option>
                    <option value="文字">文字</option>
                    <option value="口述">口述</option>
                    <option value="音乐">音乐</option>
                    <option value="戏剧">戏剧</option>
                    <option value="曲艺">曲艺</option>
                    <option value="舞蹈">舞蹈</option>
                    <option value="杂技">杂技</option>
                    <option value="美术">美术</option>
                    <option value="建筑">建筑</option>
                    <option value="摄影">摄影</option>
                    <option value="电影">电影</option>
                    <option value="类似摄制电影方法创作的作品">类似摄制电影方法创作的作品</option>
                    <option value="工程设计图">工程设计图</option>
                    <option value="产品设计图">产品设计图</option>
                </select>
                <div class="hint">根据《著作权法》规定的作品类别选择</div>
            </div>

            <!-- 委托事项 -->
            <div class="field-group">
                <label><i class="fas fa-check-square"></i> 委托事项 <span class="required">*</span></label>
                <div class="checkbox-group">
                    <label><input type="checkbox" class="matter" value="著作权自愿登记"> 著作权自愿登记</label>
                    <label><input type="checkbox" class="matter" value="著作权转让合同备案"> 著作权转让合同备案</label>
                    <label><input type="checkbox" class="matter" value="著作权专有许可使用合同备案"> 专有许可合同备案</label>
                </div>
                <div class="hint">可多选，勾选后将自动写入委托书</div>
            </div>

            <!-- 委托人签名 -->
            <div class="field-group">
                <label><i class="fas fa-signature"></i> 委托人签名</label>
                <input type="text" id="signature" placeholder="委托人签名">
            </div>

            <!-- 委托日期 -->
            <div class="field-group">
                <label><i class="far fa-calendar-alt"></i> 委托日期</label>
                <input type="date" id="entrustDate">
            </div>

            <!-- 按钮 -->
            <div class="submit-area">
                <button class="btn-submit" id="submitBtn"><i class="fas fa-check-circle"></i> 提交登记</button>
                <button class="btn-preview" id="previewBtn"><i class="fas fa-eye"></i> 预览</button>
            </div>
        </div>

        <!-- 委托书预览 -->
        <div class="letter-preview" id="letterPreview">
            <div class="letter-title">玉旨和锦 · <span class="highlight">著作权登记</span></div>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-footer" id="letterFooter">
                <div class="sign">委托人：<span id="signatureDisplay"></span></div>
                <div class="sign">委托日期：<span id="dateDisplay"></span></div>
            </div>
            <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn-preview" id="copyLetterBtn" style="flex:1; background:#2a2438; color:white; border:none; padding:10px; border-radius:60px; font-weight:500; cursor:pointer;">
                    <i class="fas fa-copy"></i> 复制全文
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {

            // ============================================================
            // 1. 接口配置 - 使用本地代理
            // ============================================================
            const API_CONFIG = {
                // 本地代理地址（启动 proxy-server.js 后生效）
                baseURL: 'https://yuzhihejin.top/api',
                // 或者本地开发时用：'http://localhost:3000/api'
                endpoints: {
                    uploadIdPhoto: '/copyright/upload/id-photo',
                    uploadWork: '/copyright/upload/work',
                    submitRegister: '/copyright/register/submit'
                },
                getHeaders: function() {
                    const token = localStorage.getItem('hubei_token') || '';
                    return {
                        'Authorization': token ? 'Bearer ' + token : '',
                        'X-Requested-With': 'XMLHttpRequest'
                    };
                }
            };

            // ============================================================
            // 2. 接口封装函数
            // ============================================================

            async function uploadFile(url, formData) {
                const response = await fetch(API_CONFIG.baseURL + url, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_CONFIG.getHeaders().Authorization || '',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: formData,
                    signal: AbortSignal.timeout(30000)
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                return await response.json();
            }

            async function submitJson(url, data) {
                const response = await fetch(API_CONFIG.baseURL + url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': API_CONFIG.getHeaders().Authorization || '',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(data),
                    signal: AbortSignal.timeout(30000)
                });
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                return await response.json();
            }

            async function uploadIdPhoto(file1, file2) {
                const formData = new FormData();
                formData.append('photoFront', file1);
                formData.append('photoBack', file2);
                formData.append('type', 'id_photo');
                formData.append('timestamp', Date.now());
                return await uploadFile(API_CONFIG.endpoints.uploadIdPhoto, formData);
            }

            async function uploadWorkFile(file) {
                const formData = new FormData();
                formData.append('workFile', file);
                formData.append('type', 'work_original');
                formData.append('timestamp', Date.now());
                return await uploadFile(API_CONFIG.endpoints.uploadWork, formData);
            }

            async function submitRegister(data) {
                return await submitJson(API_CONFIG.endpoints.submitRegister, data);
            }

            // ============================================================
            // 3. DOM 引用
            // ============================================================
            const entrustor = document.getElementById('entrustor');
            const entrustorId = document.getElementById('entrustorId');
            const agent = document.getElementById('agent');
            const agentId = document.getElementById('agentId');
            const workName = document.getElementById('workName');
            const workCategory = document.getElementById('workCategory');
            const matterChecks = document.querySelectorAll('.matter');
            const signature = document.getElementById('signature');
            const entrustDate = document.getElementById('entrustDate');

            const idPhotoInput1 = document.getElementById('idPhotoInput1');
            const idPhotoLabel1 = document.getElementById('idPhotoLabel1');
            const idPhotoInput2 = document.getElementById('idPhotoInput2');
            const idPhotoLabel2 = document.getElementById('idPhotoLabel2');
            const workFileInput = document.getElementById('workFileInput');
            const workFileLabel = document.getElementById('workFileLabel');

            const preview = document.getElementById('letterPreview');
            const letterBody = document.getElementById('letterBody');
            const signatureDisplay = document.getElementById('signatureDisplay');
            const dateDisplay = document.getElementById('dateDisplay');
            const toast = document.getElementById('toast');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // ============================================================
            // 4. 文件上传显示
            // ============================================================
            idPhotoInput1.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    idPhotoLabel1.innerHTML =
                        `<i class="fas fa-check-circle" style="color:#5f8b6b;"></i> ${e.target.files[0].name}`;
                } else {
                    idPhotoLabel1.innerHTML = `<i class="fas fa-plus-circle"></i> 上传正面照片`;
                }
            });

            idPhotoInput2.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    idPhotoLabel2.innerHTML =
                        `<i class="fas fa-check-circle" style="color:#5f8b6b;"></i> ${e.target.files[0].name}`;
                } else {
                    idPhotoLabel2.innerHTML = `<i class="fas fa-plus-circle"></i> 上传反面照片`;
                }
            });

            workFileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    workFileLabel.innerHTML =
                        `<i class="fas fa-check-circle" style="color:#5f8b6b;"></i> ${e.target.files[0].name}`;
                } else {
                    workFileLabel.innerHTML = `<i class="fas fa-plus-circle"></i> 上传作品文件`;
                }
            });

            // ============================================================
            // 5. 业务函数
            // ============================================================
            function getSelectedMatters() {
                const selected = [];
                matterChecks.forEach(cb => { if (cb.checked) selected.push(cb.value); });
                return selected;
            }

            function generateLetterData() {
                const eName = entrustor.value.trim() || '【委托人】';
                const eId = entrustorId.value.trim() || '【证件号】';
                const aName = agent.value.trim() || '湖北文韵科技有限公司';
                const aId = agentId.value.trim() || '91420111MAEL5MNX50';
                const work = workName.value.trim() || '《作品名称》';
                const category = workCategory.value || '【请选择类别】';
                const matters = getSelectedMatters();
                const mattersText = matters.length > 0 ? matters.join('、') : '著作权相关事务';
                const sig = signature.value.trim() || '委托人';
                const date = entrustDate.value || new Date().toISOString().split('T')[0];
                const dateObj = new Date(date + 'T00:00:00');
                const dateStr = dateObj.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
                const body =
                    `本人/本单位 ${eName}，身份证/营业执照号 ${eId}。\n现委托 ${aName}，身份证/营业执照号 ${aId}，\n申请办理 ${work} 作品（类别：${category}）的 ${mattersText} 及相关事务。\n特此委托。`;
                return { body, sig, dateStr, fullText: `玉旨和锦 · 著作权登记\n\n${body}\n\n委托人：${sig}\n委托日期：${dateStr}` };
            }

            function renderPreview() {
                const { body, sig, dateStr } = generateLetterData();
                letterBody.textContent = body;
                signatureDisplay.textContent = sig;
                dateDisplay.textContent = dateStr;
                preview.classList.add('active');
            }

            function showToast(msg, isError = false) {
                toast.textContent = msg;
                toast.style.background = isError ? '#c4554a' : '#2a2438';
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                    toast.style.background = '#2a2438';
                }, 3000);
            }

            function copyFullText() {
                const { fullText } = generateLetterData();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(fullText).then(() => showToast('✅ 已复制到剪贴板')).catch(() => fallbackCopy(
                    fullText));
                } else { fallbackCopy(fullText); }
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy');
                    showToast('✅ 已复制到剪贴板'); } catch (e) { showToast('⚠️ 复制失败', true); }
                document.body.removeChild(ta);
            }

            function validateForm() {
                if (!entrustor.value.trim()) { showToast('⚠️ 请填写委托人', true); return false; }
                if (!entrustorId.value.trim()) { showToast('⚠️ 请填写委托人证件号', true); return false; }
                if (idPhotoInput1.files.length === 0) { showToast('⚠️ 请上传身份证/营业执照正面照片', true); return false; }
                if (idPhotoInput2.files.length === 0) { showToast('⚠️ 请上传身份证/营业执照反面照片', true); return false; }
                if (!workName.value.trim()) { showToast('⚠️ 请填写作品名称', true); return false; }
                if (workFileInput.files.length === 0) { showToast('⚠️ 请上传作品原件', true); return false; }
                if (!workCategory.value) { showToast('⚠️ 请选择作品登记类别', true); return false; }
                if (getSelectedMatters().length === 0) { showToast('⚠️ 请至少选择一项委托事项', true); return false; }
                return true;
            }

            // ============================================================
            // 6. 提交按钮
            // ============================================================
            document.getElementById('submitBtn').addEventListener('click', async function(e) {
                e.preventDefault();
                if (!validateForm()) return;

                const btn = this;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
                btn.disabled = true;
                loadingOverlay.classList.add('active');

                try {
                    const idPhoto1 = document.getElementById('idPhotoInput1').files[0];
                    const idPhoto2 = document.getElementById('idPhotoInput2').files[0];
                    const workFile = document.getElementById('workFileInput').files[0];

                    // 并行上传文件
                    const [idResult, workResult] = await Promise.all([
                        uploadIdPhoto(idPhoto1, idPhoto2),
                        uploadWorkFile(workFile)
                    ]);

                    console.log('✅ 身份证上传结果:', idResult);
                    console.log('✅ 作品上传结果:', workResult);

                    // 构造提交数据
                    const submitData = {
                        entrustor: document.getElementById('entrustor').value.trim(),
                        entrustorId: document.getElementById('entrustorId').value.trim(),
                        agent: '湖北文韵科技有限公司',
                        agentId: '91420111MAEL5MNX50',
                        workName: document.getElementById('workName').value.trim(),
                        workCategory: document.getElementById('workCategory').value,
                        matters: getSelectedMatters(),
                        signature: document.getElementById('signature').value.trim() || '委托人',
                        entrustDate: document.getElementById('entrustDate').value,
                        idPhoto: idResult.data || idResult,
                        workFile: workResult.data || workResult,
                        letterContent: generateLetterData().body,
                        submitTime: new Date().toISOString(),
                        source: 'web_register'
                    };

                    const result = await submitRegister(submitData);
                    console.log('✅ 登记提交成功:', result);

                    const registerId = result.data?.registerId || result.registerId || '未知';
                    showToast(`✅ 登记已提交！编号：${registerId}`);

                    renderPreview();
                    setTimeout(() => preview.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);

                } catch (error) {
                    console.error('❌ 提交失败:', error);
                    let errorMsg = '提交失败，请检查网络或稍后重试';
                    if (error.message) {
                        errorMsg = error.message;
                    }
                    showToast('❌ ' + errorMsg, true);
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    loadingOverlay.classList.remove('active');
                }
            });

            // ============================================================
            // 7. 其他按钮事件
            // ============================================================
            document.getElementById('previewBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (!validateForm()) return;
                renderPreview();
                showToast('📄 预览已更新');
                setTimeout(() => preview.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
            });

            document.getElementById('copyLetterBtn').addEventListener('click', function(e) {
                e.preventDefault();
                if (!preview.classList.contains('active')) {
                    if (!validateForm()) return;
                    renderPreview();
                }
                copyFullText();
            });

            // ============================================================
            // 8. 初始化
            // ============================================================
            const today = new Date().toISOString().split('T')[0];
            entrustDate.value = today;

            // 检测是否通过代理访问
            if (window.location.hostname !== 'yuzhihejin.top' && window.location.hostname !== 'localhost') {
                console.warn('⚠️ 当前域名不是 yuzhihejin.top，请确认代理配置');
            }

        })();
    </script>
</body>
</html>
